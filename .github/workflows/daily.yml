name: 📱 AI 日报

于:
   workflow_dispatch:
    inputs:
      phase:
        description: "执行阶段 (generate / issue / notify / all)"
        required: false
        默认: "all"

permissions:
  contents: write   # 提交封面图到仓库
  议题: write     # 创建 GitHub Issue

jobs:
  daily-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3. Node.js + Playwright ─────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/card/package.json

      - name: Install Playwright
        working-directory: tools/card
        run: |
          npm install
          npx playwright install --with-deps chromium

      # ── 3. 生成内容 & 图片 ──────────────────────────────────────────────────
      - name: Generate posts & cover images
        env:
          LLM_API_KEY:       ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:      ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL:         ${{ secrets.LLM_MODEL }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_post.py --phase generate

      # ── 4. 提交封面图到仓库（图片 URL 在 Issue 中引用）────────────────────
      - name: Commit cover images
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add assets/ posts_data.json
          # 如果有变动才提交
          git diff --staged --quiet || git commit -m "chore: daily AI post assets $(date +%Y-%m-%d) [skip ci]"
          git pull --rebase origin master
          git push

      # ── 5. 创建 GitHub Issue ─────────────────────────────────────────────────
      - name: Create GitHub Issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/generate_post.py --phase issue

      # ── 6. 飞书逐条推送（文字 + 飞书卡片图）──────────────────────────────────
      # 可选：配置 FEISHU_APP_ID / FEISHU_APP_SECRET / FEISHU_USER_ID 后自动发图
      - name: Send Feishu notifications
        env:
          FEISHU_WEBHOOK:    ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_ID:    ${{ secrets.FEISHU_USER_ID }}
        run: python scripts/generate_post.py --phase notify
