name: 🔥 GitHub Trending AI 追踪

于:
  workflow_dispatch:
    inputs:
      since:
        description: "榜单周期 (daily / weekly / monthly)"
        required: false
        默认: "daily"
      max_posts:
        description: "最多生成帖子数 (默认 4)"
        required: false
        默认: "4"

permissions:
  contents: write   # 保存中间数据
  议题: write     # 创建 Issue

jobs:
  trending-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3. Node.js + Playwright ──────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/card/package.json

      - name: Install Playwright
        working-directory: tools/card
        run: |
          npm install
          npx playwright install --with-deps chromium

      # ── 3. 生成数据和图片 ────────────────────────────────────────────────
      - name: Generate trending posts & images
        env:
          LLM_API_KEY:       ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL:      ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL:         ${{ secrets.LLM_MODEL }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          FEISHU_WEBHOOK:    ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_ID:    ${{ secrets.FEISHU_USER_ID }}
        run: |
          python scripts/trending_issue.py \
            --since ${{ github.event.inputs.since || 'daily' }} \
            --max-posts ${{ github.event.inputs.max_posts || '4' }} \
            --phase generate

      # ── 4. 提交图片和数据（先 push，再发飞书，确保 raw URL 已生效）────
      - name: Commit trending data & images
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add trending_data.json assets/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: trending data & images $(date +%Y-%m-%d-%H%M) [skip ci]"
          git pull --rebase origin master
          git push

      # ── 5. 创建 Issue + 发飞书通知（含图片链接）────────────────────────
      - name: Create Issue & send Feishu notifications
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          FEISHU_WEBHOOK:    ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_APP_ID:     ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_ID:    ${{ secrets.FEISHU_USER_ID }}
        run: python scripts/trending_issue.py --phase publish
